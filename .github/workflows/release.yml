name: Release
on:
  workflow_run:
    workflows:
      - Tests and Code Quality
    types:
      - completed
    branches:
      - main
permissions:
  contents: write
concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true
jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Extract release version
        id: version
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          VERSION=$(printf '%s\n' "$COMMIT_MESSAGE" | sed -n 's/^release: *v\?//p' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Generate release notes from commits
        id: notes
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v' | head -2 | tail -1 | sed 's/^v//')
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > release-notes.md
          else
            git log v$PREV_TAG..HEAD --pretty=format:"- %s" > release-notes.md
          fi
      - name: Create source zip and checksum
        id: assets
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=zip -o wakeonpi-${VERSION}.zip HEAD
          sha256sum wakeonpi-${VERSION}.zip > wakeonpi-${VERSION}.zip.sha256
      - name: Create release tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            git tag "v${VERSION}"
          fi
          git push origin "v${VERSION}"
      - name: Create GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "Release ${VERSION}" \
            --notes-file release-notes.md
          gh release upload "v${VERSION}" "wakeonpi-${VERSION}.zip" "wakeonpi-${VERSION}.zip.sha256"
