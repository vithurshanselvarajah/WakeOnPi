name: Release

on:
  workflow_run:
    workflows:
      - Tests and Code Quality
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:')

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract release version
        id: version
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          VERSION=$(printf '%s\n' "$COMMIT_MESSAGE" | sed -n 's/^release: *v\?//p' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          {
            echo "## Release: v${VERSION}"
            echo
            echo "**Commit:** ${COMMIT_HASH}"
            echo "**Author:** ${COMMIT_AUTHOR}"
            echo
            echo "### Quality Assurance"
            echo "- Tests passed"
            echo "- Ruff linting passed"
          } > release-notes.md

      - name: Create release tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists locally."
          else
            git tag "v${VERSION}"
          fi
          git push origin "v${VERSION}"

      - name: Create GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "Release ${VERSION}" \
            --notes-file release-notes.md
