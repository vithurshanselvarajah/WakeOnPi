name: Release on "release" commits to main

on:
  push:
    branches:
      - main

jobs:
  create-release:
    # Use 'contains' or 'startsWith' depending on your preference
    if: ${{ startsWith(github.event.head_commit.message, 'release') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: prepare
        run: |
          # Use grep to find the version in pyproject.toml
          VERSION=$(grep -m 1 '^version = ' pyproject.toml | tr -d '"' | tr -d ' ' | cut -d "=" -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          TAG="v${{ steps.prepare.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated release for version ${{ steps.prepare.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}