name: Release
on:
  workflow_run:
    workflows:
      - Tests and Code Quality
    types:
      - completed
    branches:
      - main
permissions:
  contents: write
concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true
jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:')
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Extract release version
        id: version
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          VERSION=$(printf '%s\n' "$COMMIT_MESSAGE" | sed -n 's/^release: *v\?//p' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Get commits since last release
        id: commits
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v' | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s")
          else
            COMMITS=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s")
          fi
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Generate changelog with GitHub AI
        id: ai_changelog
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          model: openai/gpt-4o
          max-tokens: 700
          system-prompt: >-
            You write concise GitHub release notes for a Raspberry Pi camera custom
            integration. Use Markdown bullets. Do not invent changes. Use the
            commit subject, body, and changed files to summarize what changed.
          prompt: |
            Create release notes for WakeOnPi.

            Version: ${{ steps.version.outputs.version }}
            Tag: v${{ steps.version.outputs.version }}

            Commits:
            ${{ steps.commits.outputs.commits }}
      - name: Write release notes
        env:
          AI_NOTES_FILE: ${{ steps.ai_changelog.outputs.response-file }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: v${{ steps.version.outputs.version }}
          COMMITS: ${{ steps.commits.outputs.commits }}
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "# WakeOnPi ${VERSION}"
            echo
            if [[ -n "${AI_NOTES_FILE:-}" && -s "$AI_NOTES_FILE" ]]; then
              cat "$AI_NOTES_FILE"
            else
              echo "## Changes"
              echo
              if [[ -n "$COMMITS" ]]; then
                echo "$COMMITS"
              else
                echo "- Release ${TAG}"
              fi
            fi
          } > release-notes.md
      - name: Create source zip and checksum
        id: assets
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=zip -o wakeonpi-${VERSION}.zip HEAD
          sha256sum wakeonpi-${VERSION}.zip > wakeonpi-${VERSION}.zip.sha256
      - name: Create release tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            git tag "v${VERSION}"
          fi
          git push origin "v${VERSION}"
      - name: Create GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "Release ${VERSION}" \
            --notes-file release-notes.md
          gh release upload "v${VERSION}" "wakeonpi-${VERSION}.zip" "wakeonpi-${VERSION}.zip.sha256"
